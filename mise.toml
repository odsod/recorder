[tools]
go = "1.26"
golangci-lint = "2.12"

[tasks.build]
description = "Full CI build (lint, test, tidy, diff)"
run = "mise run lint && mise run test && mise run tidy && mise run diff"

[tasks.lint]
description = "Lint Go code"
run = "golangci-lint run --fix"

[tasks.test]
description = "Run Go tests"
run = "go test -cover ./..."

[tasks.tidy]
description = "Tidy Go modules"
run = "go mod tidy"

[tasks.diff]
description = "Check for uncommitted diffs (CI gate)"
run = """
if git rev-parse --is-inside-work-tree &>/dev/null && ! jj root &>/dev/null; then
  git diff --exit-code
fi
"""

[tasks.install]
description = "Build and install recorder binary"
run = "go install ./cmd/recorder"
