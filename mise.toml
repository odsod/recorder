# recorder mise configuration
#
# Usage examples:
#   mise install                # Install all tools
#   mise run build              # Full CI build
#   mise run lint               # Run linter
#   mise run test               # Run tests

[tools]
go = "1.26"
golangci-lint = "2.12"

[tasks.build]
description = "run full CI build"
run = "mise run lint && mise run test && mise run tidy && mise run diff"

[tasks.lint]
description = "lint Go code"
run = "golangci-lint run --fix"

[tasks.test]
description = "run Go tests"
run = "go test -v -cover ./..."

[tasks.tidy]
description = "tidy Go mod file"
run = "go mod tidy -v"

[tasks.diff]
description = "check for git diffs"
run = """
if git rev-parse --is-inside-work-tree &>/dev/null && ! jj root &>/dev/null; then
  git diff --exit-code
fi
"""
