[tools]
go = "1.26"
golangci-lint = "2.12"
goreleaser = "2"

[tasks.build]
description = "Full CI build (lint, test, tidy, check, diff)"
run = "mise run lint && mise run test && mise run tidy && mise run check && mise run diff"

[tasks.lint]
description = "Lint Go code"
run = "golangci-lint run --fix"

[tasks.test]
description = "Run Go tests"
run = "go test -cover ./..."

[tasks.tidy]
description = "Tidy Go modules"
run = "go mod tidy"

[tasks.check]
description = "Validate goreleaser config and snapshot build"
run = "goreleaser check && goreleaser build --snapshot --clean && rm -rf dist"

[tasks.diff]
description = "Check for uncommitted diffs (CI gate)"
run = """
if git rev-parse --is-inside-work-tree &>/dev/null && ! jj root &>/dev/null; then
  git diff --exit-code
fi
"""

[tasks.install]
description = "Build and install recorder binary with calver"
run = """
version=$(git tag -l 'v*' | sort -V | tail -1)
if [ -z "$version" ]; then version="dev"; fi
go install -ldflags "-X main.version=$version" .
"""

[tasks.release]
description = "Tag a new calver release and publish with goreleaser"
run = """
year=$(date +%Y)
month=$(date +%-m)
last=$(git tag -l "v${year}.${month}.*" | sort -V | tail -1)
if [ -z "$last" ]; then
  patch=0
else
  patch=$(( ${last##*.} + 1 ))
fi
tag="v${year}.${month}.${patch}"
echo "Releasing $tag"
git tag "$tag"
git push origin "$tag"
goreleaser release --clean
echo "Released recorder $tag"
"""
