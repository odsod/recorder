version: "2"

formatters:
  enable:
    - gci
    - gofumpt
    - goimports
    - golines
  settings:
    golines:
      max-len: 120

linters:
  enable:
    # Enabled by default (explicit for visibility).
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    # Additional linters.
    - bodyclose
    - copyloopvar
    - durationcheck
    - errorlint
    - gocritic
    - gosec
    - intrange
    - misspell
    - modernize
    - nilerr
    - noctx
    - nolintlint
    - perfsprint
    - revive
    - sloglint
    - unconvert
  settings:
    sloglint:
      context: "all"
      key-naming-case: "camel"
      kv-only: true
      msg-style: "lowercased"
      no-mixed-args: true
    revive:
      rules:
        - name: exported
          arguments:
            - checkPrivateReceivers
            - sayRepetitiveInsteadOfStutters
    gosec:
      excludes:
        # Integer conversions are bounded by audio sample sizes and system APIs.
        - G115
        # Subprocess args come from trusted config, not user input.
        - G204
        # File permissions 0644/0755 are intentional for user-facing files.
        - G301
        - G302
        - G306
        # File paths come from config, not untrusted input.
        - G304
        # HTTP URLs come from config, not untrusted input.
        - G704
        # Fprintf to stderr is not XSS.
        - G705
